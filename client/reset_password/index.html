<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>if(localStorage.getItem('pk-theme')==='dark')document.documentElement.classList.add('pk-dark');</script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <title>Reset Password — PrintoKids PH</title>
    <style>
        body {
            font-family: 'Anthropic Sans', 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #FF5733 0%, #8B44CC 55%, #2D1B69 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .reset-card {
            background: #fff;
            border-radius: 20px;
            padding: clamp(28px, 6vw, 44px);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 48px rgba(0,0,0,.18), 0 8px 16px rgba(0,0,0,.12);
            transition: background 0.22s, border-color 0.22s;
        }
        .reset-card img { display: block; margin: 0 auto 12px; width: 160px; }
        .reset-card h5 { text-align: center; font-weight: 700; color: #0D0D0D; margin-bottom: 24px; font-size: 1.2rem; letter-spacing: -0.02em; }
        .form-label { font-weight: 600; font-size: 14px; color: #0D0D0D; }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #E5E7EB;
            box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
            padding: 10px 14px;
            font-family: inherit;
            background: #fff;
            color: #0D0D0D;
            transition: border-color 0.22s, background 0.22s, color 0.22s;
        }
        .form-control:focus {
            border-color: #FF5733;
            box-shadow: inset 0 1px 3px rgba(0,0,0,.06), 0 0 0 3px rgba(255,87,51,0.15);
            outline: none;
        }
        .btn-reset {
            background: #FF5733;
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.22s, transform 0.22s, box-shadow 0.22s;
        }
        .btn-reset:hover { background: #e04a28; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,87,51,0.35); }
        .btn-reset:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        /* Theme toggle */
        .pk-theme-toggle-float {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 9999;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: background 0.22s;
        }
        .pk-theme-toggle-float:hover { background: rgba(255,255,255,0.28); }
        /* Dark mode */
        html.pk-dark .reset-card {
            background: #1A1A2E;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 24px 48px rgba(0,0,0,.45), 0 8px 16px rgba(0,0,0,.30);
        }
        html.pk-dark .reset-card h5,
        html.pk-dark .form-label { color: #F3F4F6; }
        html.pk-dark .form-control {
            background: #12121F;
            border-color: rgba(255,255,255,0.15);
            color: #F3F4F6;
        }
        html.pk-dark .form-control::placeholder { color: rgba(255,255,255,0.35); }
        html.pk-dark .alert-danger { background: rgba(220,38,38,0.2); color: #FCA5A5; border: none; }
        html.pk-dark .alert-success { background: rgba(5,150,105,0.2); color: #6EE7B7; border: none; }
        html.pk-dark .btn-outline-danger { border-color: rgba(220,38,38,0.6) !important; color: #FCA5A5 !important; }
    </style>
</head>
<body>
    <button class="pk-theme-toggle-float" id="themeToggleBtn" title="Toggle dark mode">🌙</button>
    <div class="reset-card">
        <img src="../../admin/admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
        <h5>Reset Your Password</h5>

        <div id="invalidCard" style="display:none" class="alert alert-danger text-center">
            <strong>Invalid or expired reset link.</strong><br>
            <small>Please go back and request a new one.</small><br>
            <a href="../../client/index.html" class="btn btn-sm btn-outline-danger mt-2">Back to Sign In</a>
        </div>

        <div id="resetForm">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" placeholder="At least 8 characters">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your new password">
            </div>
            <div id="resetError" class="alert alert-danger py-2 small" style="display:none"></div>
            <button class="btn-reset" id="resetBtn" onclick="submitReset()">Set New Password</button>
        </div>

        <div id="resetSuccess" style="display:none" class="text-center">
            <div class="alert alert-success mb-3">
                <strong>Password updated successfully!</strong>
            </div>
            <a href="../../client/index.html" class="btn btn-warning w-100" style="font-weight:700;">Sign In Now</a>
        </div>
    </div>

    <script>
        const API   = '../../api';
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('resetForm').style.display   = 'none';
            document.getElementById('invalidCard').style.display = 'block';
        }

        async function submitReset() {
            const newPass  = document.getElementById('newPassword').value;
            const confirm  = document.getElementById('confirmPassword').value;
            const errEl    = document.getElementById('resetError');
            const btn      = document.getElementById('resetBtn');
            errEl.style.display = 'none';

            if (!newPass || !confirm) {
                errEl.textContent   = 'Both fields are required.';
                errEl.style.display = 'block';
                return;
            }
            if (newPass.length < 8) {
                errEl.textContent   = 'Password must be at least 8 characters.';
                errEl.style.display = 'block';
                return;
            }
            if (newPass !== confirm) {
                errEl.textContent   = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;

            try {
                const res  = await fetch(`${API}/auth.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'reset_password',
                        token,
                        new_password: newPass,
                        user_type: 'customer',
                    }),
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('resetForm').style.display    = 'none';
                    document.getElementById('resetSuccess').style.display = 'block';
                } else {
                    errEl.textContent   = data.error || 'Something went wrong. Please try again.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                }
            } catch {
                errEl.textContent   = 'Connection error. Make sure XAMPP is running.';
                errEl.style.display = 'block';
                btn.disabled = false;
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') submitReset(); });
    </script>
    <script src="../theme.js"></script>
</body>
</html>
