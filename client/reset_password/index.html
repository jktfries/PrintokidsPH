<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Reset Password — PrintoKids PH</title>
    <style>
        body {
            background: linear-gradient(135deg, #FFF9C4, #eab66d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .reset-card img { display: block; margin: 0 auto 8px; width: 160px; }
        .reset-card h5 { text-align: center; font-weight: 700; color: #333; margin-bottom: 24px; }
        .form-label { font-weight: 600; font-size: 14px; }
        .btn-reset {
            background: #d4a362;
            color: #fff;
            font-weight: 700;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover { background: #b8893a; }
        .btn-reset:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="reset-card">
        <img src="../../admin/admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
        <h5>Reset Your Password</h5>

        <div id="invalidCard" style="display:none" class="alert alert-danger text-center">
            <strong>Invalid or expired reset link.</strong><br>
            <small>Please go back and request a new one.</small><br>
            <a href="../../client/index.html" class="btn btn-sm btn-outline-danger mt-2">Back to Sign In</a>
        </div>

        <div id="resetForm">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" placeholder="At least 8 characters">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your new password">
            </div>
            <div id="resetError" class="alert alert-danger py-2 small" style="display:none"></div>
            <button class="btn-reset" id="resetBtn" onclick="submitReset()">Set New Password</button>
        </div>

        <div id="resetSuccess" style="display:none" class="text-center">
            <div class="alert alert-success mb-3">
                <strong>Password updated successfully!</strong>
            </div>
            <a href="../../client/index.html" class="btn btn-warning w-100" style="font-weight:700;">Sign In Now</a>
        </div>
    </div>

    <script>
        const API   = '../../api';
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('resetForm').style.display   = 'none';
            document.getElementById('invalidCard').style.display = 'block';
        }

        async function submitReset() {
            const newPass  = document.getElementById('newPassword').value;
            const confirm  = document.getElementById('confirmPassword').value;
            const errEl    = document.getElementById('resetError');
            const btn      = document.getElementById('resetBtn');
            errEl.style.display = 'none';

            if (!newPass || !confirm) {
                errEl.textContent   = 'Both fields are required.';
                errEl.style.display = 'block';
                return;
            }
            if (newPass.length < 8) {
                errEl.textContent   = 'Password must be at least 8 characters.';
                errEl.style.display = 'block';
                return;
            }
            if (newPass !== confirm) {
                errEl.textContent   = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;

            try {
                const res  = await fetch(`${API}/auth.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'reset_password',
                        token,
                        new_password: newPass,
                        user_type: 'customer',
                    }),
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('resetForm').style.display    = 'none';
                    document.getElementById('resetSuccess').style.display = 'block';
                } else {
                    errEl.textContent   = data.error || 'Something went wrong. Please try again.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                }
            } catch {
                errEl.textContent   = 'Connection error. Make sure XAMPP is running.';
                errEl.style.display = 'block';
                btn.disabled = false;
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') submitReset(); });
    </script>
</body>
</html>
