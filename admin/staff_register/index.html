<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>PrintoKids PH — Staff Registration</title>
    <style>
        body {
            background: linear-gradient(135deg, #FFF9C4, #eab66d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .reg-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .reg-card img { display: block; margin: 0 auto 8px; width: 140px; }
        .reg-card h5 { text-align: center; font-weight: 700; color: #333; margin-bottom: 6px; }
        .reg-card p.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 28px; }
        .form-label { font-weight: 600; font-size: 14px; }
        .btn-register {
            background: #d4a362;
            color: #fff;
            font-weight: 700;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 4px;
        }
        .btn-register:hover { background: #b8873e; color: #fff; }
        .back-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .back-link a { color: #d4a362; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="reg-card">
    <img src="../admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
    <h5>Staff Registration</h5>
    <p class="subtitle">Create your staff account. An admin will grant you access permissions.</p>

    <div id="successMsg" class="alert alert-success" style="display:none">
        Account created! You can now <a href="../admin_login/index.html">log in</a>.
    </div>
    <div id="errorMsg" class="alert alert-danger" style="display:none"></div>

    <form id="registerForm">
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label">First Name *</label>
                <input type="text" class="form-control" id="firstName" required placeholder="Juan">
            </div>
            <div class="col-6">
                <label class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="lastName" required placeholder="dela Cruz">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-control" id="email" required placeholder="juan@printokids.ph">
        </div>
        <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="tel" class="form-control" id="contactNumber" placeholder="+63 9XX XXX XXXX">
        </div>
        <div class="mb-3">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control" id="password" required
                placeholder="At least 8 characters" autocomplete="new-password">
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm Password *</label>
            <input type="password" class="form-control" id="confirmPassword" required
                autocomplete="new-password">
        </div>
        <button type="submit" class="btn-register" id="submitBtn">Create Account</button>
    </form>

    <div class="back-link">
        Already have an account? <a href="../admin_login/index.html">Log in here</a>
    </div>
</div>

<script>
const API = '../../api';

document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();

    const errEl  = document.getElementById('errorMsg');
    const okEl   = document.getElementById('successMsg');
    const btn    = document.getElementById('submitBtn');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';

    const firstName     = document.getElementById('firstName').value.trim();
    const lastName      = document.getElementById('lastName').value.trim();
    const email         = document.getElementById('email').value.trim();
    const contactNumber = document.getElementById('contactNumber').value.trim();
    const password      = document.getElementById('password').value;
    const confirm       = document.getElementById('confirmPassword').value;

    if (!firstName || !lastName || !email || !password) {
        errEl.textContent   = 'Please fill in all required fields.';
        errEl.style.display = 'block';
        return;
    }
    if (password !== confirm) {
        errEl.textContent   = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
    }
    if (password.length < 8) {
        errEl.textContent   = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Creating account…';

    try {
        const res  = await fetch(`${API}/auth.php`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action:         'staff_register',
                first_name:     firstName,
                last_name:      lastName,
                email,
                contact_number: contactNumber,
                password,
            }),
        });
        const data = await res.json();

        if (data.success) {
            document.getElementById('registerForm').style.display = 'none';
            okEl.style.display = 'block';
        } else {
            errEl.textContent   = data.error || 'Registration failed. Please try again.';
            errEl.style.display = 'block';
            btn.disabled    = false;
            btn.textContent = 'Create Account';
        }
    } catch {
        errEl.textContent   = 'Connection error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Create Account';
    }
});
</script>

</body>
</html>
