<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>if(localStorage.getItem('pk-theme')==='dark')document.documentElement.classList.add('pk-dark');</script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <title>PrintoKids PH — Staff Registration</title>
    <style>
        body {
            font-family: 'Anthropic Sans', 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #FF5733 0%, #8B44CC 55%, #2D1B69 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .reg-card {
            background: #fff;
            border-radius: 20px;
            padding: clamp(24px, 5vw, 44px);
            width: 100%;
            max-width: 460px;
            box-shadow: 0 24px 48px rgba(0,0,0,.18), 0 8px 16px rgba(0,0,0,.12);
            transition: background 0.22s, border-color 0.22s;
        }
        .reg-card img { display: block; margin: 0 auto 12px; width: 140px; }
        .reg-card h5 { text-align: center; font-weight: 700; color: #2D1B69; margin-bottom: 6px; font-size: 1.15rem; letter-spacing: -0.02em; }
        .reg-card p.subtitle { text-align: center; color: #6B7280; font-size: 0.875rem; margin-bottom: 28px; }
        .form-label { font-weight: 600; font-size: 0.83rem; color: #0D0D0D; }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #E5E7EB;
            box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
            padding: 10px 14px;
            font-family: inherit;
            background: #fff;
            color: #0D0D0D;
            transition: border-color 0.22s, background 0.22s, color 0.22s;
        }
        .form-control:focus {
            border-color: #FF5733;
            box-shadow: inset 0 1px 3px rgba(0,0,0,.06), 0 0 0 3px rgba(255,87,51,0.15);
            outline: none;
        }
        .btn-register {
            background: #FF5733;
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 4px;
            cursor: pointer;
            transition: background 0.22s, transform 0.22s, box-shadow 0.22s;
        }
        .btn-register:hover { background: #e04a28; color: #fff; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,87,51,0.35); }
        .back-link { text-align: center; margin-top: 20px; font-size: 0.875rem; color: #6B7280; }
        .back-link a { color: #FF5733; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
        /* Theme toggle */
        .pk-theme-toggle-float {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 9999;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: background 0.22s;
        }
        .pk-theme-toggle-float:hover { background: rgba(255,255,255,0.28); }
        /* Dark mode */
        html.pk-dark .reg-card {
            background: #1A1A2E;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 24px 48px rgba(0,0,0,.45), 0 8px 16px rgba(0,0,0,.30);
        }
        html.pk-dark .reg-card h5 { color: #C8F552; }
        html.pk-dark .reg-card p.subtitle,
        html.pk-dark .back-link { color: #9CA3AF; }
        html.pk-dark .back-link a { color: #FF5733; }
        html.pk-dark .form-label { color: #E5E7EB; }
        html.pk-dark .form-control {
            background: #12121F;
            border-color: rgba(255,255,255,0.15);
            color: #F3F4F6;
        }
        html.pk-dark .form-control::placeholder { color: rgba(255,255,255,0.35); }
        html.pk-dark .alert-danger { background: rgba(220,38,38,0.2); color: #FCA5A5; border: none; }
        html.pk-dark .alert-success { background: rgba(5,150,105,0.2); color: #6EE7B7; border: none; }
        html.pk-dark .alert-success a { color: #6EE7B7; }
    </style>
</head>
<body>
<button class="pk-theme-toggle-float" id="adminThemeToggleBtn" title="Toggle dark mode">🌙</button>

<div class="reg-card">
    <img src="../admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
    <h5>Staff Registration</h5>
    <p class="subtitle">Create your staff account. An admin will grant you access permissions.</p>

    <div id="successMsg" class="alert alert-success" style="display:none">
        Account created! You can now <a href="../admin_login/index.html">log in</a>.
    </div>
    <div id="errorMsg" class="alert alert-danger" style="display:none"></div>

    <form id="registerForm">
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label">First Name *</label>
                <input type="text" class="form-control" id="firstName" required placeholder="Juan">
            </div>
            <div class="col-6">
                <label class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="lastName" required placeholder="dela Cruz">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-control" id="email" required placeholder="juan@printokids.ph">
        </div>
        <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="tel" class="form-control" id="contactNumber" placeholder="+63 9XX XXX XXXX">
        </div>
        <div class="mb-3">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control" id="password" required
                placeholder="At least 8 characters" autocomplete="new-password">
        </div>
        <div class="mb-4">
            <label class="form-label">Confirm Password *</label>
            <input type="password" class="form-control" id="confirmPassword" required
                autocomplete="new-password">
        </div>
        <button type="submit" class="btn-register" id="submitBtn">Create Account</button>
    </form>

    <div class="back-link">
        Already have an account? <a href="../admin_login/index.html">Log in here</a>
    </div>
</div>

<script>
const API = '../../api';

document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();

    const errEl  = document.getElementById('errorMsg');
    const okEl   = document.getElementById('successMsg');
    const btn    = document.getElementById('submitBtn');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';

    const firstName     = document.getElementById('firstName').value.trim();
    const lastName      = document.getElementById('lastName').value.trim();
    const email         = document.getElementById('email').value.trim();
    const contactNumber = document.getElementById('contactNumber').value.trim();
    const password      = document.getElementById('password').value;
    const confirm       = document.getElementById('confirmPassword').value;

    if (!firstName || !lastName || !email || !password) {
        errEl.textContent   = 'Please fill in all required fields.';
        errEl.style.display = 'block';
        return;
    }
    if (password !== confirm) {
        errEl.textContent   = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
    }
    if (password.length < 8) {
        errEl.textContent   = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Creating account…';

    try {
        const res  = await fetch(`${API}/auth.php`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action:         'staff_register',
                first_name:     firstName,
                last_name:      lastName,
                email,
                contact_number: contactNumber,
                password,
            }),
        });
        const data = await res.json();

        if (data.success) {
            document.getElementById('registerForm').style.display = 'none';
            okEl.style.display = 'block';
        } else {
            errEl.textContent   = data.error || 'Registration failed. Please try again.';
            errEl.style.display = 'block';
            btn.disabled    = false;
            btn.textContent = 'Create Account';
        }
    } catch {
        errEl.textContent   = 'Connection error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Create Account';
    }
});
</script>
<script src="../admin_dashboard/theme-admin.js"></script>
</body>
</html>
