<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <title>PrintoKids PH – Admin Login</title>
    <style>
        body { background: #f0f2f5; }
        .login-card { max-width: 420px; margin: 100px auto; border: none; box-shadow: 0 4px 20px rgba(0,0,0,.1); border-radius: 12px; }
        .login-header { background: #198754; border-radius: 12px 12px 0 0; padding: 24px; text-align: center; }
        .login-header img { height: 50px; }
        .login-header h5 { color: #fff; margin-top: 10px; font-weight: 700; letter-spacing: .05em; }
        #errorMsg { display: none; }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="login-header">
            <img src="../admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
            <h5>ADMIN PANEL</h5>
        </div>
        <div class="card-body p-4">
            <div id="errorMsg" class="alert alert-danger py-2"></div>

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Staff ID</label>
                <input type="number" class="form-control" id="staffId" placeholder="Enter your staff ID" min="1">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-secondary">Password</label>
                <input type="password" class="form-control" id="adminPassword" placeholder="Enter your password">
            </div>
            <button class="btn btn-success w-100 fw-bold" id="loginBtn" onclick="adminLogin()">Sign In</button>
        </div>
        <div class="card-footer text-center bg-light text-muted small py-3 rounded-bottom">
            &copy; 2026 PrintoKids PH &mdash; Authorized Personnel Only
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
    <script>
        // If already logged in as admin, go straight to dashboard --
        fetch('../../api/auth.php?action=check')
            .then(r => r.json())
            .then(data => {
                if (data.logged_in && data.user_type === 'admin') {
                    window.location.href = '../admin_dashboard/admin_index.html';
                }
            })
            .catch(() => {});

        function adminLogin() {
            const staffId  = document.getElementById('staffId').value.trim();
            const password = document.getElementById('adminPassword').value;
            const errorEl  = document.getElementById('errorMsg');
            const btn      = document.getElementById('loginBtn');

            errorEl.style.display = 'none';

            if (!staffId || !password) {
                errorEl.textContent = 'Please enter your Staff ID and password.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in…';

            fetch('../../api/auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'login',
                    user_type: 'admin',
                    email: staffId,      // auth.php reads this as staff ID
                    password: password
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '../admin_dashboard/admin_index.html';
                } else {
                    errorEl.textContent = data.error || 'Login failed. Please try again.';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            })
            .catch(() => {
                errorEl.textContent = 'Network error. Please check your connection.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            });
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
</html>
