<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>if(localStorage.getItem('pk-theme')==='dark')document.documentElement.classList.add('pk-dark');</script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <title>PrintoKids PH — Admin Login</title>
    <style>
        body {
            font-family: 'Anthropic Sans', 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #FF5733 0%, #8B44CC 55%, #2D1B69 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: clamp(28px, 6vw, 44px);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 48px rgba(0,0,0,.18), 0 8px 16px rgba(0,0,0,.12);
            transition: background 0.22s, border-color 0.22s;
        }
        .login-card img { display: block; margin: 0 auto 12px; width: 160px; }
        .login-card h5 {
            text-align: center;
            font-weight: 700;
            color: #2D1B69;
            margin-bottom: 28px;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }
        .form-label { font-weight: 600; font-size: 0.83rem; color: #0D0D0D; }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #E5E7EB;
            box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
            padding: 10px 14px;
            font-family: inherit;
            background: #fff;
            color: #0D0D0D;
            transition: border-color 0.22s, background 0.22s, color 0.22s;
        }
        .form-control:focus {
            border-color: #FF5733;
            box-shadow: inset 0 1px 3px rgba(0,0,0,.06), 0 0 0 3px rgba(255,87,51,0.15);
            outline: none;
        }
        .btn-login {
            background: #FF5733;
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.22s, transform 0.22s, box-shadow 0.22s;
        }
        .btn-login:hover { background: #e04a28; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,87,51,0.35); }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        a { color: #FF5733; text-decoration: none; font-weight: 600; }
        a:hover { color: #e04a28; }
        #loginAlert { display: none; }
        #forgotAdminSection { display: none; }
        /* Theme toggle */
        .pk-theme-toggle-float {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 9999;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: background 0.22s;
        }
        .pk-theme-toggle-float:hover { background: rgba(255,255,255,0.28); }
        /* Dark mode */
        html.pk-dark .login-card {
            background: #1A1A2E;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 24px 48px rgba(0,0,0,.45), 0 8px 16px rgba(0,0,0,.30);
        }
        html.pk-dark .login-card h5 { color: #C8F552; }
        html.pk-dark .form-label { color: #E5E7EB; }
        html.pk-dark .form-control {
            background: #12121F;
            border-color: rgba(255,255,255,0.15);
            color: #F3F4F6;
        }
        html.pk-dark .form-control::placeholder { color: rgba(255,255,255,0.35); }
        html.pk-dark .alert-danger { background: rgba(220,38,38,0.2); color: #FCA5A5; border: none; }
        html.pk-dark .alert-success { background: rgba(5,150,105,0.2); color: #6EE7B7; border: none; }
        html.pk-dark p, html.pk-dark small { color: rgba(255,255,255,0.6); }
        html.pk-dark a { color: #FF5733; }
    </style>
</head>
<body>
    <button class="pk-theme-toggle-float" id="adminThemeToggleBtn" title="Toggle dark mode">🌙</button>
    <div class="login-card">
        <img src="../admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
        <h5>Admin Portal</h5>

        <div id="loginAlert" class="alert alert-danger" role="alert"></div>

        <div class="mb-3">
            <label for="staffId" class="form-label">Staff ID</label>
            <input type="number" class="form-control" id="staffId" placeholder="Enter your staff ID" min="1">
        </div>
        <div class="mb-3">
            <label for="staffPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="staffPassword" placeholder="Enter your password">
        </div>
        <button class="btn-login" onclick="handleAdminLogin()">Sign In</button>
        <p class="text-center mt-3 mb-0" style="font-size:13px;">
            <a href="#" onclick="showForgotAdmin(); return false;">Forgot your password?</a>
        </p>

        <!-- Forgot Password Section -->
        <div id="forgotAdminSection">
            <hr style="margin:20px 0 16px">
            <p style="font-size:13px;color:#555;margin-bottom:12px;">Enter your email address or Staff ID to generate a reset link.</p>
            <div class="mb-3">
                <label class="form-label">Email or Staff ID</label>
                <input type="text" class="form-control" id="forgotAdminIdentifier" placeholder="Email or numeric Staff ID">
            </div>
            <div id="forgotAdminError" class="alert alert-danger py-2 small" style="display:none"></div>
            <div id="forgotAdminSuccess" style="display:none" class="mb-3">
                <p class="small text-success mb-1">Reset link generated! Click below:</p>
                <a id="forgotAdminResetLink" href="#" target="_blank"
                   class="btn btn-warning btn-sm w-100 mb-1" style="font-weight:700;">Open Password Reset Page</a>
                <p class="small text-muted mb-0">Link expires in 1 hour.</p>
            </div>
            <div id="forgotAdminBtns">
                <button class="btn-login" onclick="submitForgotAdmin()" style="margin-top:0;">Generate Reset Link</button>
                <p class="text-center mt-2 mb-0" style="font-size:13px;">
                    <a href="#" onclick="hideForgotAdmin(); return false;">&larr; Back to sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API = '../../api';

        fetch(`${API}/auth.php?action=check`)
            .then(r => r.json())
            .then(data => {
                if (data.logged_in && data.user_type === 'admin') {
                    window.location.href = '../admin_dashboard/admin_index.html';
                }
            })
            .catch(() => {});

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleAdminLogin();
        });

        function showError(msg) {
            const el = document.getElementById('loginAlert');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showForgotAdmin() {
            document.getElementById('forgotAdminSection').style.display = 'block';
            document.getElementById('forgotAdminError').style.display = 'none';
            document.getElementById('forgotAdminSuccess').style.display = 'none';
        }

        function hideForgotAdmin() {
            document.getElementById('forgotAdminSection').style.display = 'none';
            document.getElementById('forgotAdminIdentifier').value = '';
        }

        async function submitForgotAdmin() {
            const identifier = document.getElementById('forgotAdminIdentifier').value.trim();
            const errEl  = document.getElementById('forgotAdminError');
            const okEl   = document.getElementById('forgotAdminSuccess');
            const btns   = document.getElementById('forgotAdminBtns');
            errEl.style.display = 'none';
            okEl.style.display  = 'none';

            if (!identifier) {
                errEl.textContent   = 'Please enter your email or Staff ID.';
                errEl.style.display = 'block';
                return;
            }

            btns.querySelector('button').disabled = true;

            try {
                const res  = await fetch(`${API}/auth.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'forgot_password', email: identifier, user_type: 'staff' }),
                });
                const data = await res.json();

                if (data.success && data.reset_url) {
                    document.getElementById('forgotAdminResetLink').href = data.reset_url;
                    okEl.style.display  = 'block';
                    btns.querySelector('button').style.display = 'none';
                } else if (data.success) {
                    errEl.textContent   = 'No account found with that email or Staff ID.';
                    errEl.style.display = 'block';
                } else {
                    errEl.textContent   = data.error || 'Something went wrong.';
                    errEl.style.display = 'block';
                }
            } catch {
                errEl.textContent   = 'Connection error. Make sure XAMPP is running.';
                errEl.style.display = 'block';
            }

            btns.querySelector('button').disabled = false;
        }

        function handleAdminLogin() {
            const staffId = document.getElementById('staffId').value.trim();
            const password = document.getElementById('staffPassword').value;

            document.getElementById('loginAlert').style.display = 'none';

            if (!staffId || !password) {
                showError('Please enter your Staff ID and password.');
                return;
            }

            fetch(`${API}/auth.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'login',
                    email: staffId,
                    password: password,
                    user_type: 'admin'
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '../admin_dashboard/admin_index.html';
                } else {
                    showError(data.error || 'Invalid credentials. Please try again.');
                }
            })
            .catch(() => showError('Connection error. Make sure XAMPP is running.'));
        }
    </script>
    <script src="../admin_dashboard/theme-admin.js"></script>
</body>
</html>
