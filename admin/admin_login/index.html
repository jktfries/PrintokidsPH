<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>PrintoKids PH — Admin Login</title>
    <style>
        body {
            background: linear-gradient(135deg, #FFF9C4, #eab66d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .login-card img { display: block; margin: 0 auto 8px; width: 160px; }
        .login-card h5 { text-align: center; font-weight: 700; color: #333; margin-bottom: 28px; }
        .form-label { font-weight: 600; font-size: 14px; }
        .btn-login {
            background: #d4a362;
            color: #fff;
            font-weight: 700;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #b8893a; }
        #loginAlert { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="../admin_dashboard/images/printokids_logo_transparent.png" alt="PrintoKids PH">
        <h5>Admin Portal</h5>

        <div id="loginAlert" class="alert alert-danger" role="alert"></div>

        <div class="mb-3">
            <label for="staffId" class="form-label">Staff ID</label>
            <input type="number" class="form-control" id="staffId" placeholder="Enter your staff ID" min="1">
        </div>
        <div class="mb-3">
            <label for="staffPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="staffPassword" placeholder="Enter your password">
        </div>
        <button class="btn-login" onclick="handleAdminLogin()">Sign In</button>
        <!--<p class="text-center text-muted mt-3 mb-0" style="font-size:13px;">
            Default: Staff ID <strong>1</strong> / Password <strong>admin1234</strong>
        </p>
    -->
        
    </div>

    <script>
        const API = '../../api';

        fetch(`${API}/auth.php?action=check`)
            .then(r => r.json())
            .then(data => {
                if (data.logged_in && data.user_type === 'admin') {
                    window.location.href = '../admin_dashboard/admin_index.html';
                }
            })
            .catch(() => {});

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleAdminLogin();
        });

        function showError(msg) {
            const el = document.getElementById('loginAlert');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function handleAdminLogin() {
            const staffId = document.getElementById('staffId').value.trim();
            const password = document.getElementById('staffPassword').value;

            document.getElementById('loginAlert').style.display = 'none';

            if (!staffId || !password) {
                showError('Please enter your Staff ID and password.');
                return;
            }

            fetch(`${API}/auth.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'login',
                    email: staffId,
                    password: password,
                    user_type: 'admin'
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '../admin_dashboard/admin_index.html';
                } else {
                    showError(data.error || 'Invalid credentials. Please try again.');
                }
            })
            .catch(() => showError('Connection error. Make sure XAMPP is running.'));
        }
    </script>
</body>
</html>
